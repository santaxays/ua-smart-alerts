name: UA Smart Alerts

on:
  schedule:
    # Every 6 hours at :00 — aligned with the cpi_spike detector's 6h window
    - cron: "0 */6 * * *"
  workflow_dispatch:  # Manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore alert dedup state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Restore private system prompt
        env:
          SYSTEM_PROMPT_RU: ${{ secrets.SYSTEM_PROMPT_RU }}
        run: |
          mkdir -p prompts
          printf '%s' "$SYSTEM_PROMPT_RU" > prompts/system_prompt.ru.md

      - name: Run alert pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python src/main.py

      - name: Save updated alert dedup state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/alert_state.json
          key: alert-state-${{ github.run_id }}
